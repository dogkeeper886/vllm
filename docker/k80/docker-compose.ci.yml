# CI override for docker-compose.yml
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
#
# Disables restart-on-crash so that a failed container stays `exited` and
# can be detected by `docker inspect .State.Status`. Without this, the
# default restart: unless-stopped hides crashes behind a restart loop.
services:
  vllm:
    restart: "no"
