name: K80 Runtime Smoke Test

on:
  workflow_dispatch:
    inputs:
      tp_size:
        description: "Tensor parallel size (1=single GPU die; higher = multi-die, power-risky)"
        required: false
        default: "1"
        type: string
      model:
        description: "Model to serve"
        required: false
        default: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
        type: string
      k80_trace:
        description: "Enable VLLM_K80_TRACE=1 for TP-init hang diagnosis logs"
        required: false
        default: "1"
        type: string
  workflow_call:
    inputs:
      tp_size:
        required: false
        default: "1"
        type: string
      model:
        required: false
        default: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
        type: string
      k80_trace:
        required: false
        default: "1"
        type: string
    outputs:
      result:
        description: "Runtime smoke test result"
        value: ${{ jobs.runtime.outputs.result }}

concurrency:
  group: k80-hardware
  cancel-in-progress: false

jobs:
  runtime:
    name: Container smoke test
    runs-on: [self-hosted, vllm]
    env:
      TP_SIZE: ${{ inputs.tp_size || '1' }}
      MODEL: ${{ inputs.model || 'TinyLlama/TinyLlama-1.1B-Chat-v1.0' }}
      VLLM_K80_TRACE: ${{ inputs.k80_trace || '1' }}
      VLLM_LOG_DIR: /tmp/k80-ci-logs
    outputs:
      result: ${{ steps.smoke.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Ensure runtime image matches branch SHA
        working-directory: docker/k80
        env:
          BRANCH_SHA: ${{ github.sha }}
        run: |
          # k80-runtime.yml used to only verify the image existed, which meant
          # a stale image silently masked source-level changes (see #10). Now
          # the build step stamps org.opencontainers.image.revision with the
          # source SHA; if it differs from the checked-out branch SHA, we
          # rebuild from local source before running the smoke.
          IMAGE_SHA=$(docker inspect --format='{{index .Config.Labels "org.opencontainers.image.revision"}}' \
            vllm37-local:latest 2>/dev/null || echo "")
          if [ "$IMAGE_SHA" = "$BRANCH_SHA" ]; then
            echo "vllm37-local:latest already at branch SHA ($BRANCH_SHA); reusing image."
            exit 0
          fi
          if [ -z "$IMAGE_SHA" ]; then
            echo "Runtime image missing or has no revision label; building from current source."
          else
            echo "Runtime image is at $IMAGE_SHA but branch is $BRANCH_SHA; rebuilding."
          fi
          if ! docker image inspect vllm37-builder:latest >/dev/null 2>&1; then
            echo "::error::vllm37-builder:latest not found. Run k80-build.yml with rebuild_builder=true, or docker pull dogkeeper886/vllm37-builder."
            exit 1
          fi
          make build-local

      - name: Prepare log directory
        run: |
          # NCCL_DEBUG_FILE in the container writes into /var/log/vllm, which is
          # bind-mounted from $VLLM_LOG_DIR on the host. Directory must exist
          # and be writable before `compose up` or the mount silently becomes
          # root-owned empty dir and NCCL cannot write.
          mkdir -p "$VLLM_LOG_DIR"
          chmod 777 "$VLLM_LOG_DIR"

      - name: Start vLLM container
        working-directory: docker/k80
        run: |
          echo "Starting vLLM: TP_SIZE=$TP_SIZE MODEL=$MODEL VLLM_K80_TRACE=$VLLM_K80_TRACE"
          TP_SIZE=$TP_SIZE MODEL=$MODEL \
          VLLM_K80_TRACE=$VLLM_K80_TRACE VLLM_LOG_DIR=$VLLM_LOG_DIR \
            docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          docker compose ps

      - name: Wait for server ready
        id: wait
        working-directory: docker/k80
        run: |
          echo "Waiting up to 10 min for http://localhost:8000/v1/models ..."
          for i in $(seq 1 120); do
            CID=$(docker compose -f docker-compose.yml -f docker-compose.ci.yml ps -q vllm)
            STATE=$(docker inspect --format='{{.State.Status}}' "$CID" 2>/dev/null || echo "missing")
            if [ "$STATE" != "running" ]; then
              echo "::error::Container state=$STATE before server became ready."
              docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail 200
              exit 1
            fi
            if curl -fsS --max-time 3 http://localhost:8000/v1/models >/dev/null 2>&1; then
              echo "Server ready after ${i}x 5s polls."
              exit 0
            fi
            sleep 5
          done
          echo "::error::Server did not become ready in 10 minutes."
          exit 1

      - name: Smoke test â€” /v1/completions
        id: smoke
        run: |
          RESP=$(curl -fsS --max-time 60 http://localhost:8000/v1/completions \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL\",\"prompt\":\"Hello\",\"max_tokens\":16,\"temperature\":0}")
          echo "--- response ---"
          echo "$RESP"

          TEXT=$(echo "$RESP" | jq -r '.choices[0].text')
          FINISH=$(echo "$RESP" | jq -r '.choices[0].finish_reason')
          COMPLETION_TOKENS=$(echo "$RESP" | jq -r '.usage.completion_tokens')

          if [ -z "$TEXT" ] || [ "$TEXT" = "null" ]; then
            echo "::error::Response missing choices[0].text"
            exit 1
          fi

          GOLDEN=docker/k80/ci/golden.json
          GOLDEN_MODEL=$(jq -r '.applies_when.model' "$GOLDEN")
          GOLDEN_TP=$(jq -r '.applies_when.tp_size' "$GOLDEN")
          if [ "$MODEL" = "$GOLDEN_MODEL" ] && [ "$TP_SIZE" = "$GOLDEN_TP" ]; then
            EXPECT_TEXT=$(jq -r '.expected.text' "$GOLDEN")
            EXPECT_TOKENS=$(jq -r '.expected.completion_tokens' "$GOLDEN")
            EXPECT_FINISH=$(jq -r '.expected.finish_reason' "$GOLDEN")
            FAIL=0
            if [ "$TEXT" != "$EXPECT_TEXT" ]; then
              echo "::error::Golden text mismatch"
              echo "  expected: $(printf %q "$EXPECT_TEXT")"
              echo "  actual:   $(printf %q "$TEXT")"
              FAIL=1
            fi
            if [ "$COMPLETION_TOKENS" != "$EXPECT_TOKENS" ]; then
              echo "::error::completion_tokens mismatch (expected=$EXPECT_TOKENS actual=$COMPLETION_TOKENS)"
              FAIL=1
            fi
            if [ "$FINISH" != "$EXPECT_FINISH" ]; then
              echo "::error::finish_reason mismatch (expected=$EXPECT_FINISH actual=$FINISH)"
              FAIL=1
            fi
            if [ "$FAIL" = "1" ]; then
              echo "::notice::To regenerate the golden, see $GOLDEN _comment field."
              exit 1
            fi
            echo "Golden baseline match: text, completion_tokens, finish_reason all as expected."
          else
            echo "MODEL=$MODEL TP_SIZE=$TP_SIZE does not match golden (model=$GOLDEN_MODEL tp=$GOLDEN_TP) â€” skipping baseline check."
          fi

      - name: Capture container logs
        if: always()
        working-directory: docker/k80
        run: |
          mkdir -p /tmp/k80-ci-logs
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs \
            --no-color > /tmp/k80-ci-logs/vllm.log 2>&1 || true
          tail -200 /tmp/k80-ci-logs/vllm.log || true

      - name: Tear down container
        if: always()
        working-directory: docker/k80
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: k80-runtime-logs
          path: /tmp/k80-ci-logs/
