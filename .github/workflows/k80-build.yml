name: K80 Docker Build

on:
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Force rebuild without Docker layer cache"
        required: false
        default: false
        type: boolean
      rebuild_builder:
        description: "Rebuild the builder image from scratch (~120 min)"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      no_cache:
        required: false
        default: false
        type: boolean
      rebuild_builder:
        required: false
        default: false
        type: boolean
    outputs:
      result:
        description: "Build result"
        value: ${{ jobs.build.outputs.result }}

concurrency:
  group: k80-hardware
  cancel-in-progress: false

jobs:
  build:
    name: Build vllm37-local image
    runs-on: [self-hosted, vllm]
    # Cap so a stuck build can't hold the k80-hardware concurrency lock
    # indefinitely. 60 min covers the typical cached-builder path; 180 min
    # covers the rare rebuild_builder=true full builder rebuild (~120 min).
    timeout-minutes: ${{ inputs.rebuild_builder && 180 || 60 }}
    env:
      BUILDER_IMAGE: vllm37-builder
      BUILDER_SOURCE: dogkeeper886/vllm37-builder:latest
      RUNTIME_LOCAL: vllm37-local
    outputs:
      result: ${{ steps.build-local.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Ensure builder image exists
        run: |
          if [ "${{ inputs.rebuild_builder }}" = "true" ]; then
            echo "rebuild_builder=true — building $BUILDER_IMAGE from source"
            cd docker/k80
            make build-builder
          elif ! docker image inspect "$BUILDER_IMAGE:latest" >/dev/null 2>&1; then
            echo "Builder image not found locally. Pulling $BUILDER_SOURCE..."
            docker pull "$BUILDER_SOURCE"
            docker tag "$BUILDER_SOURCE" "$BUILDER_IMAGE:latest"
          else
            echo "Builder image $BUILDER_IMAGE:latest already present — skipping."
          fi

      - name: Build runtime image (local source)
        id: build-local
        working-directory: docker/k80
        run: |
          if [ "${{ inputs.no_cache }}" = "true" ]; then
            make build-local-no-cache
          else
            make build-local
          fi

      - name: Report image size
        if: always()
        run: |
          docker image inspect "$RUNTIME_LOCAL:latest" \
            --format 'Image: {{.RepoTags}}  Size: {{.Size}} bytes' || \
            echo "Runtime image not available."

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
